name: CI

# Runs on every push to master and every PR. Verifies the extension still
# packages cleanly so a broken package.json or theme file can't reach a release.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Package extension (validation)
        run: npx --yes @vscode/vsce package --out /tmp/middle-earth-themes.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: /tmp/middle-earth-themes.vsix
